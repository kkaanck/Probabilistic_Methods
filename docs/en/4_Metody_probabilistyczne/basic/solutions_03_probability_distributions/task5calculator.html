<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5 - Multinomial Calculator & Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 30px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; max-width: 900px; width: 100%; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h3 { color: #2c3e50; margin-top: 0; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px;}
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; color: #34495e; display: flex; justify-content: space-between;}
        input[type="range"] { width: 100%; cursor: pointer; }
        .result-box { background: #e8f4f8; padding: 15px; border-radius: 8px; text-align: center; margin-top: 20px; border: 1px solid #b6d4fe;}
        .result-value { font-size: 24px; font-weight: bold; color: #0d6efd; margin-top: 5px;}
        .note { font-size: 12px; color: #6c757d; text-align: center; }
        .chart-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; display: flex; align-items: center; justify-content: center;}
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h3>Task 5 Calculator</h3>
            
            <div class="form-group">
                <label>Small Count (k1): <span id="val_k1">0</span></label>
                <input type="range" id="input_k1" min="0" max="5" value="0">
            </div>

            <div class="form-group">
                <label>Medium Count (k2): <span id="val_k2">0</span></label>
                <input type="range" id="input_k2" min="0" max="5" value="0">
            </div>

            <div class="form-group" style="opacity: 0.7;">
                <label>Large Count (k3): <span id="val_k3">5</span></label>
                <p class="note">k3 is calculated automatically (5 - k1 - k2)</p>
            </div>

            <div class="result-box">
                <div>Calculated Probability P:</div>
                <div class="result-value" id="result_prob">0.0000</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        // Factorial function
        function factorialize(num) {
            if (num === 0 || num === 1) return 1;
            for (var i = num - 1; i >= 1; i--) { num *= i; }
            return num;
        }

        // Selecting HTML elements
        const inputK1 = document.getElementById('input_k1');
        const inputK2 = document.getElementById('input_k2');
        const valK1 = document.getElementById('val_k1');
        const valK2 = document.getElementById('val_k2');
        const valK3 = document.getElementById('val_k3');
        const resultProb = document.getElementById('result_prob');

        // Initializing Chart.js
        const ctx = document.getElementById('myChart').getContext('2d');
        let myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Small (k1)', 'Medium (k2)', 'Large (k3)'],
                datasets: [{
                    label: 'Number of Rolls',
                    data: [0, 0, 5],
                    backgroundColor: [
                        'rgba(54, 162, 235, 0.7)', // Blue
                        'rgba(255, 206, 86, 0.7)', // Yellow
                        'rgba(255, 99, 132, 0.7)'  // Red
                    ],
                    borderColor: [
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(255, 99, 132, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 5, // Y-axis max is 5 since we have 5 total rolls
                        ticks: { stepSize: 1 } // Show only whole numbers
                    }
                },
                plugins: {
                    legend: { display: false } // Hides the top legend box
                }
            }
        });

        // Calculate and Update Chart Function
        function calculateProbability() {
            let k1 = parseInt(inputK1.value);
            let k2 = parseInt(inputK2.value);

            // The sum of k1 and k2 cannot exceed 5
            if (k1 + k2 > 5) {
                if (this === inputK1) { k2 = 5 - k1; inputK2.value = k2; } 
                else { k1 = 5 - k2; inputK1.value = k1; }
            }

            let k3 = 5 - k1 - k2;

            // Update text values
            valK1.innerText = k1;
            valK2.innerText = k2;
            valK3.innerText = k3;

            // Calculate Probability
            let coef = 120 / (factorialize(k1) * factorialize(k2) * factorialize(k3));
            let prob = coef * Math.pow(1/3, 5);

            // Display Result
            resultProb.innerText = prob.toFixed(4) + " (" + (prob * 100).toFixed(2) + "%)";

            // UPDATE CHART
            myChart.data.datasets[0].data = [k1, k2, k3];
            myChart.update();
        }

        // Listen for slider movements
        inputK1.addEventListener('input', calculateProbability);
        inputK2.addEventListener('input', calculateProbability);
        
        // Run first calculation on page load
        calculateProbability();
    </script>
</body>
</html>
