<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5 - Monte Carlo Simulation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #f0f0f0; display: flex; justify-content: center; padding: 40px; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); width: 100%; max-width: 500px; }
        h3 { color: #4facfe; margin-top: 0; text-align: center; border-bottom: 2px solid #4facfe; padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        input[type="number"] { width: 60px; padding: 5px; border-radius: 5px; border: 1px solid #555; background: #444; color: white; text-align: center;}
        button { width: 100%; padding: 12px; background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%); border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; transition: 0.3s;}
        button:hover { opacity: 0.8; }
        .results { display: flex; justify-content: space-between; margin-top: 25px; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333;}
        .box { text-align: center; width: 48%; }
        .box-title { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;}
        .box-value { font-size: 22px; font-weight: bold; margin-top: 8px; color: #fff;}
        .sim-value { color: #00f2fe; }
        .theo-value { color: #ff0844; }
        #log { margin-top: 15px; font-family: monospace; font-size: 12px; color: #888; background: #111; padding: 10px; border-radius: 5px; height: 80px; overflow-y: auto;}
    </style>
</head>
<body>

    <div class="card">
        <h3>Monte Carlo Simulation (Task 5)</h3>
        
        <p style="font-size: 14px; color: #ccc; text-align: center;">Set your target outcome. The computer will roll 5 dice <strong>100,000 times</strong> and count the matches.</p>

        <div class="form-group">
            <label>Target Small (1-2):</label>
            <input type="number" id="k1" min="0" max="5" value="2">
        </div>
        <div class="form-group">
            <label>Target Medium (3-4):</label>
            <input type="number" id="k2" min="0" max="5" value="2">
        </div>
        <div class="form-group">
            <label>Target Large (5-6):</label>
            <input type="number" id="k3" min="0" max="5" value="1" disabled>
        </div>

        <button onclick="runSimulation()">Run 100,000 Simulations</button>

        <div class="results">
            <div class="box">
                <div class="box-title">Simulated Result</div>
                <div class="box-value sim-value" id="res_sim">0.00%</div>
            </div>
            <div class="box">
                <div class="box-title">Theoretical Math</div>
                <div class="box-value theo-value" id="res_theo">0.00%</div>
            </div>
        </div>

        <div id="log">Awaiting simulation start...</div>
    </div>

    <script>
        // Update k3 automatically based on k1 and k2
        document.getElementById('k1').addEventListener('input', updateK3);
        document.getElementById('k2').addEventListener('input', updateK3);

        function updateK3() {
            let k1 = parseInt(document.getElementById('k1').value) || 0;
            let k2 = parseInt(document.getElementById('k2').value) || 0;
            if (k1 + k2 > 5) {
                k2 = 5 - k1;
                document.getElementById('k2').value = k2;
            }
            document.getElementById('k3').value = 5 - k1 - k2;
        }

        // Theoretical Math calculation
        function factorialize(num) {
            if (num === 0 || num === 1) return 1;
            for (var i = num - 1; i >= 1; i--) { num *= i; }
            return num;
        }

        function getTheoretical(k1, k2, k3) {
            let coef = 120 / (factorialize(k1) * factorialize(k2) * factorialize(k3));
            return coef * Math.pow(1/3, 5);
        }

        // Monte Carlo Simulation Engine
        function runSimulation() {
            const iterations = 100000; // 100k rolls
            const targetK1 = parseInt(document.getElementById('k1').value);
            const targetK2 = parseInt(document.getElementById('k2').value);
            const targetK3 = parseInt(document.getElementById('k3').value);
            const logBox = document.getElementById('log');
            
            logBox.innerHTML = `Starting ${iterations.toLocaleString()} simulations...<br>`;
            
            let matchCount = 0;

            // Simulate rolling 5 dice, 100,000 times
            for (let i = 0; i < iterations; i++) {
                let counts = [0, 0, 0]; // [Small, Medium, Large]
                
                // Roll 5 individual dice
                for(let roll = 0; roll < 5; roll++) {
                    let rand = Math.random();
                    if (rand < 1/3) counts[0]++;
                    else if (rand < 2/3) counts[1]++;
                    else counts[2]++;
                }

                // Check if this specific trial matches our target
                if (counts[0] === targetK1 && counts[1] === targetK2 && counts[2] === targetK3) {
                    matchCount++;
                }
            }

            // Calculate final empirical probability
            let empiricalProb = matchCount / iterations;
            let theoreticalProb = getTheoretical(targetK1, targetK2, targetK3);

            // Update UI
            document.getElementById('res_sim').innerText = (empiricalProb * 100).toFixed(2) + "%";
            document.getElementById('res_theo').innerText = (theoreticalProb * 100).toFixed(2) + "%";
            
            logBox.innerHTML += `Simulation Complete.<br>`;
            logBox.innerHTML += `Total exact matches found: <strong>${matchCount}</strong> out of ${iterations}.`;
        }

        // Initialize values
        updateK3();
    </script>
</body>
</html>
